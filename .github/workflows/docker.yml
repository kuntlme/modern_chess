name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker
        uses: docker/setup-buildx-action@v3

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Client Image
        run: |
          docker build \
          -f docker/dockerfile.client \
          -t kuntalmajee2557/chess-client:latest .

      - name: Build WS Image
        run: |
          docker build \
          -f docker/dockerfile.ws-server \
          -t kuntalmajee2557/chess-ws:latest .

      - name: Push Images
        run: |
          docker push kuntalmajee2557/chess-client:latest
          docker push kuntalmajee2557/chess-ws:latest